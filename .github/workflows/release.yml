name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 0.1.0"
        required: true
        type: string
      prerelease:
        description: "Mark the GitHub release as a pre-release"
        required: false
        default: true
        type: boolean

permissions:
  contents: write

jobs:
  release:
    name: Build GitHub release
    runs-on: macos-latest
    env:
      SIGNING_MODE: adhoc
      NOTARIZE: "0"
      DEVELOPER_ID_APPLICATION_P12: ${{ secrets.DEVELOPER_ID_APPLICATION_P12 }}
      DEVELOPER_ID_APPLICATION_PASSWORD: ${{ secrets.DEVELOPER_ID_APPLICATION_PASSWORD }}
      KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD || 'c2cbar-ci-keychain' }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
            tag="v${version#v}"
          else
            tag="${GITHUB_REF_NAME}"
            version="${tag#v}"
          fi
          prerelease="${{ github.event_name == 'workflow_dispatch' && inputs.prerelease || contains(github.ref_name, '-') }}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "prerelease=$prerelease" >> "$GITHUB_OUTPUT"

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: Run tests
        run: swift test

      - name: Import Developer ID certificate
        if: ${{ env.DEVELOPER_ID_APPLICATION_P12 != '' && env.DEVELOPER_ID_APPLICATION_PASSWORD != '' }}
        run: |
          keychain_path="$RUNNER_TEMP/c2cbar-signing.keychain-db"
          certificate_path="$RUNNER_TEMP/developer-id.p12"
          echo "$DEVELOPER_ID_APPLICATION_P12" | base64 --decode > "$certificate_path"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security set-keychain-settings -lut 21600 "$keychain_path"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$keychain_path"
          security import "$certificate_path" -P "$DEVELOPER_ID_APPLICATION_PASSWORD" -A -t cert -f pkcs12 -k "$keychain_path"
          security list-keychains -d user -s "$keychain_path" $(security list-keychains -d user | sed s/\"//g)
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$keychain_path"
          identity="$(security find-identity -v -p codesigning "$keychain_path" | sed -n 's/.*"\(Developer ID Application:.*\)"/\1/p' | head -n 1)"
          if [[ -z "$identity" ]]; then
            echo "No Developer ID Application identity found" >&2
            exit 1
          fi
          echo "SIGNING_MODE=identity" >> "$GITHUB_ENV"
          echo "SIGN_IDENTITY=$identity" >> "$GITHUB_ENV"

      - name: Configure notarization
        if: ${{ env.APPLE_ID != '' && env.APPLE_TEAM_ID != '' && env.APPLE_APP_SPECIFIC_PASSWORD != '' }}
        run: |
          xcrun notarytool store-credentials "c2cbar-notary" \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_APP_SPECIFIC_PASSWORD"
          echo "APPLE_KEYCHAIN_PROFILE=c2cbar-notary" >> "$GITHUB_ENV"
          echo "NOTARIZE=1" >> "$GITHUB_ENV"

      - name: Package app
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: scripts/package.sh

      - name: Write release notes
        run: |
          cat > dist/release-notes.md <<'NOTES'
          ## C2CBar

          macOS menu bar app for comparing C2C stablecoin CNY prices and reference USD/CNY rates.

          If this release was built without Apple Developer ID secrets, macOS may show extra security prompts when opening the app.
          NOTES

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: C2CBar-${{ steps.version.outputs.version }}-macos
          path: dist/*.dmg
          if-no-files-found: error

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.version.outputs.tag }}
          VERSION: ${{ steps.version.outputs.version }}
          PRERELEASE: ${{ steps.version.outputs.prerelease }}
        run: |
          release_flags=()
          if [[ "$PRERELEASE" == "true" ]]; then
            release_flags+=(--prerelease)
          fi

          gh release create "$TAG" dist/*.dmg \
            --target "$GITHUB_SHA" \
            --title "C2CBar $VERSION" \
            --notes-file dist/release-notes.md \
            "${release_flags[@]}"
